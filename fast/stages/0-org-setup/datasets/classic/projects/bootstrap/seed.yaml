parent: $folder_ids:bootstrap
name: seed
iam_by_principals:
  $iam_principals:gcp-organization-admins:
    - roles/iam.serviceAccountTokenCreator
    - roles/iam.workloadIdentityPoolAdmin
  $iam_principals:service_accounts/seed/iac-org-ro:
    - roles/browser
    - roles/cloudbuild.builds.viewer
    - roles/iam.serviceAccountViewer
    - roles/iam.workloadIdentityPoolViewer
    - $custom_roles:storage_viewer
    - roles/viewer
  $iam_principals:service_accounts/seed/iac-org-rw:
    - roles/cloudbuild.builds.editor
    - roles/iam.serviceAccountAdmin
    - roles/iam.workloadIdentityPoolAdmin
    - roles/owner
    - roles/storage.admin
  $iam_principals:service_accounts/seed/iac-pf-rw:
    - roles/serviceusage.serviceUsageConsumer
  $iam_principals:service_accounts/seed/seed-sa:
    - roles/serviceusage.serviceUsageConsumer
  $iam_principals:service_accounts/seed/iac-pf-ro:
    - roles/serviceusage.serviceUsageConsumer
  $iam_principals:service_accounts/seed/iac-security-rw:
    - roles/serviceusage.serviceUsageConsumer
  $iam_principals:service_accounts/seed/iac-security-ro:
    - roles/serviceusage.serviceUsageConsumer
services:
  - accesscontextmanager.googleapis.com
  - bigquery.googleapis.com
  - bigqueryreservation.googleapis.com
  - bigquerystorage.googleapis.com
  - billingbudgets.googleapis.com
  - cloudasset.googleapis.com
  - cloudbilling.googleapis.com
  - cloudbuild.googleapis.com
  - cloudkms.googleapis.com
  - cloudquotas.googleapis.com
  - cloudresourcemanager.googleapis.com
  - compute.googleapis.com
  - container.googleapis.com
  - datacatalog.googleapis.com
  - essentialcontacts.googleapis.com
  - iam.googleapis.com
  - iamcredentials.googleapis.com
  - logging.googleapis.com
  - monitoring.googleapis.com
  - networksecurity.googleapis.com
  - orgpolicy.googleapis.com
  - pubsub.googleapis.com
  - servicenetworking.googleapis.com
  - serviceusage.googleapis.com
  - storage-component.googleapis.com
  - storage.googleapis.com
  - sts.googleapis.com
org_policies:
  # iam.workloadIdentityPoolProviders:
  #   rules:
  #     - allow:
  #         values:
  #           - https://token.actions.githubusercontent.com
  #           - https://gitlab.com
  #           - https://app.terraform.io
data_access_logs:
  storage.googleapis.com:
    DATA_READ: {}
    DATA_WRITE: {}
  sts.googleapis.com:
    DATA_READ: {}
    DATA_WRITE: {}
  iam.googleapis.com:
    DATA_READ: {}
    DATA_WRITE: {}
service_accounts:
  iac-org-ro:
    display_name: IaC service account for org setup (read-only).
  iac-org-rw:
    display_name: IaC service account for org setup (read-write).
  iac-vpcsc-ro:
    display_name: IaC service account for VPC service controls (read-only).
  iac-vpcsc-rw:
    display_name: IaC service account for VPC service controls (read-write).
  iac-security-ro:
    display_name: IaC service account for security (read-only).
  iac-security-rw:
    display_name: IaC service account for security (read-write).
  iac-pf-ro:
    display_name: IaC service account for project factory (read-only).
  iac-pf-rw:
    display_name: IaC service account for project factory (read-write).
  seed-sa:
    display_name: IaC service account for seed project factory (read-write).
